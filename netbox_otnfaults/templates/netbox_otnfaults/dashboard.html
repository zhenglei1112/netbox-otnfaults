{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中交信通网络运行态势图</title>
    <meta name="description" content="全国OTN光传送网络运行实时监控与自动化态势展示 system">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- MapLibre GL -->
    <link href="{% static 'netbox_otnfaults/lib/maplibre-gl.css' %}" rel="stylesheet">
    <script src="{% static 'netbox_otnfaults/lib/maplibre-gl.js' %}"></script>
    <script>
        window.maplibregl = window.maplibregl || window.mapboxgl;
        window.mapboxgl = window.maplibregl;
    </script>
    <script src="{% static 'netbox_otnfaults/lib/mapbox-gl-framerate.js' %}"></script>
    <script src="{% static 'netbox_otnfaults/lib/pmtiles.js' %}"></script>

    <!-- Dashboard CSS -->
    <link href="{% static 'netbox_otnfaults/css/dashboard.css' %}" rel="stylesheet">
    <!-- Map Controls CSS -->
    <link href="{% static 'netbox_otnfaults/css/otnfault_map_controls.css' %}" rel="stylesheet">
</head>
<body>

    <!-- ═══ 顶部标题栏 ═══ -->
    <header id="header-bar">
        <div class="header-left">
            <div class="system-status">
                <span class="status-dot" id="connection-dot"></span>
                <span class="status-text" id="connection-text">数据连接中...</span>
            </div>
        </div>
        <div class="header-center">
            <h1 class="main-title">
                <span class="title-deco">◆</span>
                中交信通网络运行态势图
                <span class="title-deco">◆</span>
            </h1>
            <div class="title-sub" id="subtitle-info">自动化监控 · 智能播控</div>
        </div>
        <div class="header-right">
            <div class="datetime-display">
                <div class="date-text" id="current-date"></div>
                <div class="time-text" id="current-time"></div>
            </div>
        </div>
    </header>

    <!-- ═══ 主体区域 ═══ -->
    <main id="main-content">
        <!-- 左翼面板 - 运行核心数字 -->
        <aside id="panel-left" class="side-panel">
            <!-- 网络健康度 -->
            <div class="panel-card" id="situation-metrics-card">
                <div class="card-header">
                    <span class="card-icon">◈</span>
                    <span class="card-title">实时运行看板</span>
                </div>
                <div class="card-body">
                    <div class="health-gauge" id="health-gauge">
                        <svg viewBox="0 0 120 120" class="gauge-svg">
                            <circle cx="60" cy="60" r="52" class="gauge-bg"/>
                            <circle cx="60" cy="60" r="52" class="gauge-fill" id="gauge-fill"
                                    stroke-dasharray="327" stroke-dashoffset="327"/>
                            <text x="60" y="52" class="gauge-value" id="gauge-value">--</text>
                            <text x="60" y="76" class="gauge-label">健康指数</text>
                        </svg>
                    </div>
                    <div class="situation-metrics">
                        <div class="stat-item">
                            <span class="stat-value text-critical" id="stat-active">--</span>
                            <span class="stat-label">故障处理中</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value text-major" id="stat-upcoming-cutovers">--</span>
                            <span class="stat-label">待实施割接</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value text-success" id="stat-active-heavy-duties">--</span>
                            <span class="stat-label">重保进行中</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 运行说明 -->
            <div class="panel-card" id="trend-card">
                <div class="card-header">
                    <span class="card-icon">◈</span>
                    <span class="card-title">24H 故障趋势</span>
                </div>
                <div class="card-body">
                    <canvas id="trend-canvas" width="320" height="120"></canvas>
                </div>
            </div>

        </aside>

        <!-- 核心演播区 - 地图 -->
        <div id="map-stage">
            <div id="map-container"></div>

            <!-- 重保通知横幅 -->
            <div id="heavy-duty-banner" class="heavy-duty-banner hidden">
                <span class="banner-badge">🛡️ 重保中</span>
                <div class="banner-marquee">
                    <span id="heavy-duty-text" class="banner-text"></span>
                </div>
            </div>

            <!-- 播控状态指示器 -->
            <div id="directing-indicator">
                <span class="indicator-icon" id="directing-icon">⟳</span>
                <span class="indicator-text" id="directing-text">全局巡航</span>
            </div>

            <!-- 故障弹窗（覆盖在地图上） -->
            <div id="fault-popup" class="fault-popup hidden">
                <div class="popup-header">
                    <span class="popup-severity" id="popup-severity"></span>
                    <span class="popup-title" id="popup-title"></span>
                    <span class="popup-close" id="popup-close">✕</span>
                </div>
                <div class="popup-body" id="popup-body"></div>
            </div>
        </div>

        <!-- 右翼面板 - 综合事件 -->
        <aside id="panel-right" class="side-panel">
            <!-- 综合事件队列 -->
            <div class="panel-card" id="event-queue-card">
                <div class="card-header">
                    <span class="card-icon">◈</span>
                    <span class="card-title">综合事件队列</span>
                </div>
                <div class="card-body">
                    <div class="event-queue" id="event-queue"></div>
                </div>
            </div>

            <!-- 焦点事件详情 -->
            <div class="panel-card" id="event-focus-card">
                <div class="card-header">
                    <span class="card-icon">◈</span>
                    <span class="card-title">焦点详情</span>
                </div>
                <div class="card-body" id="event-focus-content">
                    <div class="empty-state">
                        <div class="empty-icon">⊘</div>
                        <div class="empty-text">等待事件数据...</div>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <!-- ═══ 底部信息条 ═══ -->
    <footer id="footer-bar">
        <div class="ticker-container">
            <div class="ticker-label">
                <span class="ticker-icon">⚡</span> 运行事件
            </div>
            <div class="ticker-track">
                <div class="ticker-content" id="ticker-content"></div>
            </div>
        </div>
    </footer>

    <!-- ═══ 配置数据 ═══ -->
    <script>
        window.DASHBOARD_CONFIG = {
            apikey: '{{ apikey }}',
            mapCenter: {{ map_center|safe }},
            mapZoom: {{ map_zoom }},
            mapPitch: {{ map_pitch|default:45 }},
            useLocalBasemap: {{ use_local_basemap|yesno:"true,false" }},
            localTilesUrl: '{{ local_tiles_url }}',
            localGlyphsUrl: '{{ local_glyphs_url }}',
            otnPathsPmtilesUrl: '{{ otn_paths_pmtiles_url }}',
            colors: {{ colors_config|safe }},
            dataUrl: '{% url "plugins:netbox_otnfaults:dashboard_data" %}',
            provinceGeoJsonUrl: '{% static "netbox_otnfaults/data/中国_省.geojson" %}',
            refreshInterval: 30000,
        };
    </script>

    <!-- JS Modules -->
    <script src="{% static 'netbox_otnfaults/js/map_framerate_toggle.js' %}"></script>
    <script src="{% static 'netbox_otnfaults/js/dashboard/map_engine.js' %}"></script>
    <script src="{% static 'netbox_otnfaults/js/dashboard/directing_engine.js' %}"></script>
    <script src="{% static 'netbox_otnfaults/js/dashboard/panels.js' %}"></script>
    <script src="{% static 'netbox_otnfaults/js/dashboard/effects.js' %}"></script>
    <script src="{% static 'netbox_otnfaults/js/dashboard/dashboard_app.js' %}"></script>
</body>
</html>
