<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}地图选点{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script>
        // 同步父窗口的主题设置 (深浅色模式)
        function syncThemeFromParent() {
            try {
                if (window.parent && window.parent.document) {
                    const parentTheme = window.parent.document.documentElement.getAttribute('data-bs-theme');
                    if (parentTheme) {
                        document.documentElement.setAttribute('data-bs-theme', parentTheme);
                    }
                    
                    // 监听父窗口的主题变化
                    const observer = new MutationObserver((mutations) => {
                        mutations.forEach((mutation) => {
                            if (mutation.type === "attributes" && mutation.attributeName === "data-bs-theme") {
                                const newTheme = window.parent.document.documentElement.getAttribute('data-bs-theme');
                                document.documentElement.setAttribute('data-bs-theme', newTheme || 'light');
                            }
                        });
                    });
                    
                    observer.observe(window.parent.document.documentElement, {
                        attributes: true,
                        attributeFilter: ["data-bs-theme"]
                    });
                }
            } catch (e) {
                console.warn("无法同步父级窗口的主题模式:", e);
            }
        }
        
        // 在 DOM 加载完成后执行同步
        document.addEventListener('DOMContentLoaded', syncThemeFromParent);
    </script>
</head>
<body style="margin: 0; padding: 0; overflow: hidden;">
{% block content %}{% endblock %}
</body>
</html>
