{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上周光缆中断情况通报</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Dashboard Stylings -->
    <link href="{% static 'netbox_otnfaults/css/weekly_report_dashboard.css' %}" rel="stylesheet">
    
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body class="sci-fi-theme">

    <!-- 动态背景层 -->
    <canvas id="network-bg"></canvas>

    <div class="main-container">
        <!-- 装饰性光效层 -->
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        
        <!-- 头部 -->
        <header class="header-section">
            <div class="header-center">
                <div class="title-bg">
                    <h1>上周光缆中断情况通报</h1>
                </div>
            </div>
            <div class="header-right">
                <span id="period-display">----.--.-- - ----.--.--</span>
            </div>
        </header>

        <!-- KPI顶部面板区 -->
        <section class="kpi-section">
            <div class="kpi-card wide-card">
                <div class="kpi-title">本周光缆故障总数</div>
                <div class="kpi-value-box">
                    <span class="kpi-value highlight-number" id="kpi-total-cnt">--</span>
                    <span class="kpi-unit">个</span>
                    <span class="kpi-trend trend-up" id="kpi-total-diff">--次</span>
                </div>
            </div>
            
            <div class="kpi-card wide-card">
                <div class="kpi-title">中断总时长</div>
                <div class="kpi-value-box">
                    <span class="kpi-value highlight-number" id="kpi-total-dur">--</span>
                    <span class="kpi-unit">小时</span>
                    <span class="kpi-trend trend-up" id="kpi-total-dur-diff">--小时</span>
                </div>
            </div>

            <!-- 分割线或装饰效果 -->
            <div class="h-divider-glow"></div>

            <div class="kpi-card">
                <div class="kpi-title"><i class="icon-self-built"></i> 自建光缆</div>
                <div class="kpi-sub-value" id="kpi-self-built">--次 / --h</div>
            </div>
            
            <div class="kpi-card">
                <div class="kpi-title"><i class="icon-leased"></i> 协调/租赁</div>
                <div class="kpi-sub-value" id="kpi-leased">--次 / --h</div>
            </div>
        </section>

        <!-- 中部栏：左图、中省份、右事件 -->
        <section class="middle-section">
            <div class="panel-box chart-panel">
                <div class="panel-header">
                    <span class="panel-title-deco">|</span> 中断主要原因分析
                    <span class="panel-subtitle">* 不含线路抖动</span>
                </div>
                <div class="panel-content">
                    <div id="reasonsChart" style="width: 100%; height: 100%;"></div>
                </div>
            </div>
            
            <div class="panel-box map-panel">
                <div class="panel-header">
                    <span class="panel-title-deco">|</span> 重点影响省份
                </div>
                <div class="panel-content" id="provinces-container">
                    <div class="loading-text">加载中...</div>
                </div>
            </div>

            <div class="panel-box event-panel">
                <div class="panel-header">
                    <span class="panel-title-deco">|</span> 重大事件汇总
                </div>
                <div class="panel-content">
                    <div class="event-summary-title">单次中断超过8小时（不含施工）</div>
                    <div id="major-events-container" class="events-list">
                        <!-- Events populated by JS -->
                    </div>
                </div>
                <!-- 底部免责/施工时间说明 -->
                <div class="panel-footer" id="no-const-dur-info">
                    * 不含道路施工中断总时长：--小时
                </div>
            </div>
        </section>

        <!-- 底部表格区 -->
        <section class="bottom-section">
            <div class="panel-box table-panel">
                <div class="panel-header table-header-center">
                    <div class="h-line-left"></div>
                    <div class="title-text">裸纤业务线路影响概览</div>
                    <div class="h-line-right"></div>
                </div>
                <div class="panel-content">
                    <div class="table-container">
                        <table class="sci-fi-table">
                            <tbody id="bare-fiber-tbody">
                                <!-- Data populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
        
    </div>

    <!-- 配置注入 -->
    <script>
        window.WEEKLY_REPORT_API = "{% url 'plugins:netbox_otnfaults:weekly_report_data' %}";
    </script>
    
    <!-- 业务 JS -->
    <script src="{% static 'netbox_otnfaults/js/weekly_report_dashboard.js' %}"></script>
</body>
</html>
