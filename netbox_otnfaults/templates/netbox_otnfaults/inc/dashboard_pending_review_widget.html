<style>
  .otn-pending-review {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 12px;
    text-align: center;
  }
  .otn-pending-review-icon {
    font-size: 2.2rem;
    margin-bottom: 8px;
    color: #fd7e14;
  }
  .otn-pending-review-count {
    font-size: 2rem;
    font-weight: 700;
    color: var(--nbx-body-color, #212529);
    line-height: 1;
    margin-bottom: 4px;
  }
  .otn-pending-review-count.zero {
    color: #6c757d;
  }
  .otn-pending-review-label {
    font-size: .8rem;
    color: #6c757d;
  }
  .otn-pending-review a {
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .otn-pending-review a:hover .otn-pending-review-count {
    color: #0d6efd;
  }
  .otn-pending-review a:hover .otn-pending-review-icon {
    color: #0d6efd;
    transform: scale(1.1);
    transition: all .2s ease;
  }
  .otn-pending-review .no-task {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #6c757d;
  }
  .otn-pending-review .no-task .otn-pending-review-icon {
    color: #198754;
  }
</style>

<div class="otn-pending-review">
  {% if pending_count > 0 %}
    <a href="{{ review_url }}" title="点击查看待复核故障列表">
      <span class="otn-pending-review-icon">
        <i class="mdi mdi-clipboard-alert-outline"></i>
      </span>
      <span class="otn-pending-review-count">{{ pending_count }}</span>
      <span class="otn-pending-review-label">待复核故障</span>
    </a>
  {% else %}
    <div class="no-task">
      <span class="otn-pending-review-icon">
        <i class="mdi mdi-clipboard-check-outline"></i>
      </span>
      <span class="otn-pending-review-count zero">0</span>
      <span class="otn-pending-review-label">暂无待复核故障</span>
    </div>
  {% endif %}
</div>
