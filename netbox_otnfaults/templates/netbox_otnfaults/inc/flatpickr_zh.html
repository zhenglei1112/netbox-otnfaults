<script>
// Flatpickr 中文本地化
(function() {
    'use strict';
    
    // 中文 locale 配置
    var zhLocale = {
        weekdays: {
            shorthand: ["日", "一", "二", "三", "四", "五", "六"],
            longhand: ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"]
        },
        months: {
            shorthand: ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"],
            longhand: ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"]
        },
        rangeSeparator: " 至 ",
        weekAbbreviation: "周",
        scrollTitle: "滚动切换",
        toggleTitle: "点击切换 12/24 小时时制",
        firstDayOfWeek: 1
    };

    function applyChineseLocale() {
        // 查找页面中所有 flatpickr 实例并重新配置
        var flatpickrInputs = document.querySelectorAll('.flatpickr-input');
        if (flatpickrInputs.length === 0) {
            return;
        }

        flatpickrInputs.forEach(function(input) {
            if (input._flatpickr) {
                var fp = input._flatpickr;
                // 获取当前值
                var currentValue = fp.selectedDates;
                // 设置中文 locale
                fp.set('locale', zhLocale);
                // 恢复选中的日期
                if (currentValue && currentValue.length > 0) {
                    fp.setDate(currentValue, false);
                }

                // 添加 onOpen 钩子：当字段为空时，自动填入当前日期时间
                var origOnOpen = fp.config.onOpen || [];
                fp.config.onOpen = (Array.isArray(origOnOpen) ? origOnOpen : [origOnOpen]).concat(function(selectedDates, dateStr, instance) {
                    if (selectedDates.length === 0) {
                        instance.setDate(new Date(), true);
                    }
                });
            }
        });
    }

    // 延迟执行以确保 flatpickr 已初始化
    if (document.readyState === 'complete') {
        setTimeout(applyChineseLocale, 300);
    } else {
        window.addEventListener('load', function() {
            setTimeout(applyChineseLocale, 300);
        });
    }
})();
</script>
