<script>
// Flatpickr 中文本地化
(function() {
    'use strict';
    
    // 中文 locale 配置
    var zhLocale = {
        weekdays: {
            shorthand: ["日", "一", "二", "三", "四", "五", "六"],
            longhand: ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"]
        },
        months: {
            shorthand: ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"],
            longhand: ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"]
        },
        rangeSeparator: " 至 ",
        weekAbbreviation: "周",
        scrollTitle: "滚动切换",
        toggleTitle: "点击切换 12/24 小时时制",
        firstDayOfWeek: 1
    };

    function applyChineseLocale() {
        // 查找页面中所有 flatpickr 实例并重新配置
        var flatpickrInputs = document.querySelectorAll('.flatpickr-input');
        if (flatpickrInputs.length === 0) {
            return;
        }

        var now = new Date();
        flatpickrInputs.forEach(function(input) {
            if (input._flatpickr) {
                var fp = input._flatpickr;
                // 保存当前已选日期和原始配置
                var currentValue = fp.selectedDates.length > 0 ? fp.selectedDates.slice() : null;
                var origConfig = Object.assign({}, fp.config);

                // 销毁旧实例
                fp.destroy();

                // 用原始配置重建，覆盖 defaultHour/defaultMinute 和 locale
                origConfig.locale = zhLocale;
                origConfig.defaultHour = now.getHours();
                origConfig.defaultMinute = now.getMinutes();

                var newFp = flatpickr(input, origConfig);

                // 恢复之前选中的日期
                if (currentValue && currentValue.length > 0) {
                    newFp.setDate(currentValue, false);
                }
            }
        });
    }

    // 延迟执行以确保 flatpickr 已初始化
    if (document.readyState === 'complete') {
        setTimeout(applyChineseLocale, 300);
    } else {
        window.addEventListener('load', function() {
            setTimeout(applyChineseLocale, 300);
        });
    }
})();
</script>
